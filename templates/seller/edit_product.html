{% extends "seller/layout.html" %}

{% block title %}Edit Product | Plattera Seller{% endblock %}

{% block header_content %}
<h1>Edit Product</h1>
<p>Update the details of your listing.</p>
{% endblock %}

{% block content %}
<div class="card"
    style="background: white; border-radius: 16px; padding: 1.8rem; box-shadow: var(--shadow-sm); border: 1px solid var(--border-color); max-width: 750px; margin: 0 auto;">
    <form method="POST" enctype="multipart/form-data">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div style="grid-column: span 2; margin-bottom: 0.5rem;">
                <label
                    style="display: block; margin-bottom: 0.5rem; font-weight: bold; color: var(--text-dark);">Product
                    Name</label>
                <input type="text" name="name" required value="{{ product.p_name }}"
                    style="width: 100%; padding: 0.5rem; font-size: 0.95rem; border: 1px solid var(--border-color); border-radius: 8px; font-family: var(--font-body);">
            </div>

            <div style="margin-bottom: 0.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: bold; color: var(--text-dark);">Price
                    (₹)</label>
                <input type="number" step="0.01" name="price" required value="{{ product.p_price }}"
                    style="width: 100%; padding: 0.5rem; font-size: 0.95rem; border: 1px solid var(--border-color); border-radius: 8px; font-family: var(--font-body);">
            </div>

            <div style="margin-bottom: 0.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: bold; color: var(--text-dark);">Stock
                    Quantity</label>
                <input type="number" name="stock" required value="{{ product.p_stock }}"
                    style="width: 100%; padding: 0.5rem; font-size: 0.95rem; border: 1px solid var(--border-color); border-radius: 8px; font-family: var(--font-body);">
            </div>

            <div style="margin-bottom: 0.5rem;">
                <label
                    style="display: block; margin-bottom: 0.5rem; font-weight: bold; color: var(--text-dark);">Category</label>
                <select name="category" required
                    style="width: 100%; padding: 0.5rem; font-size: 0.95rem; border: 1px solid var(--border-color); border-radius: 8px; font-family: var(--font-body);">
                    <option value="">Select Category</option>
                    {% for cat in categories %}
                    <option value="{{ cat.c_id }}" {% if product.c_id == cat.c_id %}selected{% endif %}>{{ cat.c_name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div style="margin-bottom: 0.5rem;">
                <label
                    style="display: block; margin-bottom: 0.5rem; font-weight: bold; color: var(--text-dark);">Occasion
                    (Optional)</label>
                <select name="occasion"
                    style="width: 100%; padding: 0.5rem; font-size: 0.95rem; border: 1px solid var(--border-color); border-radius: 8px; font-family: var(--font-body);">
                    <option value="">None</option>
                    <option value="Valentine's" {% if product.p_occasion == "Valentine's" %}selected{% endif %}>Valentine's</option>
                    <option value="Diwali" {% if product.p_occasion == "Diwali" %}selected{% endif %}>Diwali</option>
                    <option value="Christmas" {% if product.p_occasion == "Christmas" %}selected{% endif %}>Christmas</option>
                    <option value="Birthday" {% if product.p_occasion == "Birthday" %}selected{% endif %}>Birthday</option>
                </select>
            </div>

            <div style="grid-column: span 2; margin-bottom: 0.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: bold; color: var(--text-dark);">Product Images <span style="font-weight: normal; font-size: 0.9em;">(Leave empty to keep existing images)</span></label>
                <div style="border: 2px dashed var(--border-color); padding: 2rem; border-radius: 12px; text-align: center; background: #fafafa;">
                    <input type="file" name="product_images" id="product_images" accept="image/*" multiple 
                           style="display: none;" onchange="updatePreview(this)">
                    <label for="product_images" style="cursor: pointer;">
                        <div style="font-size: 1.6rem; color: var(--primary); margin-bottom: 0.5rem;">+</div>
                        <div style="color: var(--text-muted);">Click to upload replacement images</div>
                        <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.3rem;">PNG, JPG, JPEG up to 5MB</div>
                    </label>
                    <div id="image-preview" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 1rem; margin-top: 1rem;"></div>
                </div>
                <script>
                    function updatePreview(input) {
                        const preview = document.getElementById('image-preview');
                        preview.innerHTML = '';
                        if (input.files) {
                            Array.from(input.files).forEach(file => {
                                const reader = new FileReader();
                                reader.onload = function(e) {
                                    const imgDiv = document.createElement('div');
                                    imgDiv.style.position = 'relative';
                                    imgDiv.innerHTML = `<img src="${e.target.result}" style="width: 100%; height: 100px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border-color);">`;
                                    preview.appendChild(imgDiv);
                                }
                                reader.readAsDataURL(file);
                            });
                        }
                    }
                </script>
            </div>

            <div style="grid-column: span 2; margin-bottom: 0.5rem;">
                <label
                    style="display: block; margin-bottom: 0.5rem; font-weight: bold; color: var(--text-dark);">Description</label>
                <textarea name="description" rows="5" required
                    style="width: 100%; padding: 0.5rem; font-size: 0.95rem; border: 1px solid var(--border-color); border-radius: 8px; font-family: var(--font-body);">{{ product.p_description }}</textarea>
            </div>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button type="submit" class="btn-sm fill"
                style="padding: 0.7rem 1.8rem; background: var(--primary); color: white; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 0.95rem;">
                Save Changes
            </button>
            <a href="{{ url_for('seller.inventory') }}" class="btn-sm"
                style="padding: 0.7rem 1.8rem; border: 1px solid var(--border-color); background: transparent; border-radius: 50px; font-weight: bold; cursor: pointer; text-decoration: none; color: var(--text-dark); display: inline-block;">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
