{% extends "base.html" %}
{% block title %}Forgot Password | Plattera{% endblock %}

{% block content %}
<style>
    .auth-container {
        max-width: 450px;
        margin: 6rem auto;
        padding: 3rem;
        background: white;
        border-radius: 24px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
        text-align: center;
    }

    .auth-title {
        font-family: 'Crimson Pro', serif;
        font-size: 2.5rem;
        margin-bottom: 1rem;
        color: var(--text-dark);
    }

    .subtitle {
        color: var(--text-light);
        font-size: 0.95rem;
        margin-bottom: 2.5rem;
        line-height: 1.6;
    }

    .form-group {
        margin-bottom: 1.5rem;
        text-align: left;
    }

    .form-group label {
        display: block;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--text-light);
        margin-bottom: 0.8rem;
    }

    .form-group input {
        width: 100%;
        padding: 1rem 0;
        border: none;
        border-bottom: 1px solid #eee;
        font-size: 1rem;
        transition: 0.3s;
        background: transparent;
    }

    .form-group input:focus {
        outline: none;
        border-bottom-color: var(--primary);
    }

    .btn-auth {
        width: 100%;
        padding: 1.2rem;
        margin-top: 1rem;
        border: 2px dashed var(--text-dark);
        border-radius: 40px;
        background: #fdf9f4;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-auth:hover {
        background: var(--text-dark);
        color: white;
        transform: translateY(-2px);
    }

    .back-link {
        display: inline-block;
        margin-top: 2rem;
        font-size: 0.9rem;
        color: var(--text-light);
        text-decoration: none;
        transition: 0.3s;
    }

    .back-link:hover {
        color: var(--primary);
    }
</style>

<div class="auth-container">
    <h1 class="auth-title">Reset Password</h1>
    <p class="subtitle">Enter the email address associated with your account, and we'll send you a link to reset your
        password.</p>

    <form action="{{ url_for('auth.forgot_password') }}" method="POST">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>

        <button type="submit" class="btn-auth">Send Reset Link</button>
    </form>

    <a href="{{ url_for('auth.login') }}" class="back-link">
        <i class="fas fa-arrow-left"></i> Back to Login
    </a>
</div>
{% endblock %}
